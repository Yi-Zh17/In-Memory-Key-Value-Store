on: 
    push:
        branches:
            - main

jobs:
    build-and-test:
        name: build the codebase and run tests
        runs-on:
            ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4
            - name: Compile the tests
              run: make test
            - name: Run the tests
              run: ./test/TestMemoryPool && ./test/TestHashTable

    deploy:
        name: Deploy to EC2
        needs: build-and-test  # Only run if tests pass!
        runs-on: ubuntu-latest
        steps:
        - name: Execute remote commands via SSH
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
                cd ~/In-Memory-Key-Value-Store
                git pull origin main
                sudo docker build -t kv-store:latest .
                sudo docker stop my-kv-store || true
                sudo docker rm my-kv-store || true
                sudo docker run -d --name my-kv-store --network host kv-store:latest

